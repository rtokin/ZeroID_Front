version: "3.9"

# Zero.ID — инфраструктура: PostgreSQL + Redis
# FastAPI и Celery запускаются отдельно (через uvicorn и celery CLI)

services:
  zero_id_postgres:
    image: postgres:16-alpine
    container_name: zero_id_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zero_id
      POSTGRES_PASSWORD: zero_id_pass
      POSTGRES_DB: zero_id_db
    volumes:
      - zero_id_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zero_id -d zero_id_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  zero_id_redis:
    image: redis:7-alpine
    container_name: zero_id_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  zero_id_pg_data:
